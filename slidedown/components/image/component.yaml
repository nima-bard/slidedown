name: image
aliases: [img, picture]
description: A framed image. Void — self-closes. Local src files are copied into output/assets/.
content: none
assetProps: [src]
props:
  src:
    type: text
  alt:
    type: text
    default: ""
  caption:
    type: text
    default: ""
template: |
  <figure class="pic"><img src="{{src}}" alt="{{alt}}">{{#caption}}<figcaption>{{caption}}</figcaption>{{/caption}}</figure>
styles: |
  .pic { margin-top: 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--shadow-card); padding: 14px; }
  .pic img { display: block; width: 100%; border-radius: 14px; }
  .pic figcaption { padding: 12px 6px 2px; font-size: 14px; color: var(--color-muted); font-weight: 500; text-align: center; }
