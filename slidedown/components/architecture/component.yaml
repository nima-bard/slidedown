name: architecture
aliases: [tiers, stack]
description: A layered architecture — tiers stacked top to bottom, each a row of cards with an accent icon chip and an optional side label; connectors link the tiers. A reliable take on a system diagram (for free-form boxes + arrows, use [html]).
content: parse
template: |
  <div class="arch">{{{content}}}</div>
children:
  tier:
    aliases: [layer, row]
    content: parse
    props:
      label:
        type: text
        default: ""
    template: |
      <div class="arch-tier">{{#label}}<span class="arch-tier-label">{{label}}</span>{{/label}}<div class="arch-boxes">{{{content}}}</div></div>
    children:
      box:
        aliases: [node, service]
        content: parse
        props:
          icon:
            type: text
            default: ""
        template: |
          <div class="arch-box">{{#icon}}<span class="arch-ic">{{{icon}}}</span>{{/icon}}<span class="arch-box-label">{{{content}}}</span></div>
styles: |
  .arch { display: flex; flex-direction: column; gap: 24px; margin-top: 28px; }
  .arch-tier { display: flex; align-items: stretch; gap: 16px; }
  .arch-tier-label { flex: none; width: 104px; align-self: center; text-align: right; font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--color-muted); }
  .arch-boxes { flex: 1; position: relative; display: flex; gap: 14px; }
  .arch-box { flex: 1; display: flex; align-items: center; justify-content: center; gap: 11px; text-align: center; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--shadow-sm); padding: 18px 16px; min-height: 64px; font-weight: 600; color: var(--color-ink); }
  .arch-ic { flex: none; width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; background: color-mix(in srgb, var(--color-accent) 14%, transparent); color: var(--color-accent); }
  .arch-ic svg { width: 21px; height: 21px; display: block; }
  /* connector linking each tier to the one above, centred over the boxes region */
  .arch-tier:not(:first-child) .arch-boxes::before { content: ""; position: absolute; left: 50%; top: -24px; transform: translateX(-50%); width: 2px; height: 24px; background: color-mix(in srgb, var(--color-accent) 50%, var(--color-line)); }
