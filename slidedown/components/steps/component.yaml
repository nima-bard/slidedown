name: steps
aliases: [instructions, how-to, agenda]
description: An auto-numbered vertical list (numbered by CSS counter).
content: parse
template: |
  <div class="steps">{{{content}}}</div>
children:
  step:
    content: parse
    props:
      title:
        type: text
    template: |
      <div class="step"><span class="n"></span><div class="body"><strong>{{title}}</strong><span>{{{content}}}</span></div></div>
styles: |
  .steps { display: grid; gap: 14px; margin-top: 32px; text-align: left; counter-reset: sd-step; }
  .steps .step {
    display: flex; align-items: center; gap: 18px; background: var(--color-card);
    border-radius: 16px; padding: 16px 20px; box-shadow: var(--shadow-sm);
  }
  .steps .step .n {
    flex: none; width: 44px; height: 44px; border-radius: 50%; background: var(--gradient-accent);
    color: var(--color-on-accent); font-weight: 700; font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .steps .step .n::before { counter-increment: sd-step; content: counter(sd-step); }
  .steps .step .body strong { display: block; font-size: 17px; }
  .steps .step .body span { font-size: 14px; color: var(--color-muted); }
