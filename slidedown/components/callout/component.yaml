name: callout
aliases: [note, important]
description: One highlighted statement — a tinted bar.
content: parse
props:
  tone:
    type: enum
    values: [info, tip, warn, key]
    default: key
  icon:
    type: text
    default: ""
template: |
  <div class="callout tone-{{tone}}">{{#icon}}<span class="co-ic">{{{icon}}}</span>{{/icon}}<div class="co-body">{{{content}}}</div></div>
styles: |
  .callout {
    display: inline-flex; gap: 12px; align-items: center; text-align: left;
    border-radius: 16px; padding: 16px 22px; margin-top: 26px; font-size: 16px; font-weight: 600;
    background: var(--gradient-accent); color: var(--color-on-accent); box-shadow: var(--shadow-card);
  }
  .callout .co-body { font-weight: 600; }
  .callout strong { color: inherit; }
  .co-ic {
    flex: none; width: 26px; height: 26px; border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,.25);
  }
  .callout.tone-info { background: #dcebff; color: #1d4ed8; box-shadow: var(--shadow-sm); }
  .callout.tone-info .co-ic { background: #bfdbfe; }
  .callout.tone-tip { background: #d9f6e3; color: #15803d; box-shadow: var(--shadow-sm); }
  .callout.tone-tip .co-ic { background: #b7eccc; }
  .callout.tone-warn { background: #fdeccd; color: #92400e; box-shadow: var(--shadow-sm); }
  .callout.tone-warn .co-ic { background: #fbdc9b; }
  .callout.tone-key { background: var(--gradient-accent); color: var(--color-on-accent); }
