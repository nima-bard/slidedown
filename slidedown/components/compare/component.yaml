name: compare
aliases: [comparison]
description: A comparison table — *row = chosen, y/n cells render as ticks/crosses.
content: table
compare: true
props:
  head:
    type: token
    default: ""
template: |
  <div class="tablewrap"{{#head}} style="--th: var(--color-{{head}})"{{/head}}>{{{content}}}</div>
styles: |
  .cmp { width: 100%; border-collapse: collapse; font-size: clamp(15px, 1.6vw, 20px); }
  .cmp th { text-align: left; color: var(--th, var(--color-muted)); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; padding: 0 18px 16px; }
  .cmp td { padding: 16px 18px; border-top: 1px solid var(--color-line); }
  .cmp .name { font-weight: 600; }
  .cmp .c { text-align: center; }
  .cmp .c svg { width: 22px; height: 22px; display: inline-block; vertical-align: middle; }
  .cmp .yes { color: var(--color-ok); font-weight: 700; font-size: 1.2em; }
  .cmp .no { color: var(--color-danger); font-weight: 700; font-size: 1.2em; }
  .cmp tr.pick td { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }
  .cmp tr.pick .name { color: var(--color-accent); }
