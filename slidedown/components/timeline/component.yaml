name: timeline
aliases: [roadmap, phases, journey]
description: Horizontal milestones on a track. A phase with the `animated` flag pulses ("beeps").
content: parse
template: |
  <div class="timeline">{{{content}}}</div>
children:
  phase:
    aliases: [milestone]
    content: parse
    props:
      when:
        type: text
        default: ""
      title:
        type: text
      state:
        type: enum
        values: [current, future]
      animated:
        type: flag
    template: |
      <div class="tl{{#state}} {{state}}{{/state}}{{#animated}} animated{{/animated}}"><span class="tl-dot"></span><span class="tl-when">{{when}}</span><span class="tl-title">{{title}}</span><span class="tl-sub">{{{content}}}</span></div>
styles: |
  .timeline { display: flex; margin-top: 40px; }
  .tl { flex: 1; position: relative; padding: 28px 12px 0; text-align: center; min-width: 130px; }
  .tl::before { content: ""; position: absolute; top: 7px; left: 0; right: 0; height: 4px; background: var(--color-line); border-radius: 2px; }
  .tl:first-child::before { left: 50%; }
  .tl:last-child::before { right: 50%; }
  .tl-dot { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 18px; height: 18px; border-radius: 50%; background: var(--color-card); border: 4px solid var(--color-accent-2); z-index: 1; }
  .tl.current .tl-dot { background: var(--gradient-accent); border-color: #fff; box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-accent) 28%, transparent); }
  .tl.future { opacity: .72; }
  .tl.future .tl-dot { border-style: dashed; }
  .tl-when { display: block; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--color-accent); }
  .tl-title { display: block; font-size: 17px; margin-top: 4px; }
  .tl-sub { display: block; font-size: 13px; color: var(--color-muted); margin-top: 3px; }
  /* `animated` flag: the dot "beeps" — an expanding ring pulse (plain CSS) */
  .tl.animated .tl-dot::after {
    content: ""; position: absolute; inset: -5px; border-radius: 50%; pointer-events: none;
    border: 2.5px solid var(--color-accent); animation: sd-beep 1.5s ease-out infinite;
  }
  @keyframes sd-beep {
    0%   { transform: scale(.7); opacity: .85; }
    70%  { opacity: 0; }
    100% { transform: scale(2.6); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) { .tl.animated .tl-dot::after { display: none; } }
